<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - SUSS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<script>
// AUTH CHECK
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 bg-dark text-white p-3" style="height:100vh;">
            <h4>SUSS</h4>
            <hr>
            <a href="#" class="text-white d-block" onclick="show('dashboard')">Dashboard</a>
            <a href="#" class="text-white d-block" onclick="show('expense')">Expense</a>
            <a href="#" class="text-white d-block" onclick="show('notes')">Notes</a>
            <a href="#" class="text-white d-block" onclick="show('planner')">Planner</a>
            <a href="#" class="text-white d-block" onclick="show('resume')">Resume</a>

            <hr>
            <button class="btn btn-danger w-100" onclick="logout()">Logout</button>
        </div>

        <!-- Content -->
        <div class="col-md-10 p-4">

            <div id="dashboard">
                <h2>Welcome to SUSS</h2>
                <p>Your all-in-one student productivity system</p>
            </div>

            <div id="expense" style="display:none;">
                <h3>Expense Tracker</h3>
                <input id="amount" class="form-control mb-2" placeholder="Amount">
                <input id="category" class="form-control mb-2" placeholder="Category">
                <button class="btn btn-primary" onclick="addExpense()">Add</button>
                <ul id="expenseList" class="mt-2 list-group"></ul>
            </div>

            <div id="notes" style="display:none;">
                <h3>Notes</h3>
                <input id="noteTitle" class="form-control mb-2" placeholder="Title">
                <textarea id="noteContent" class="form-control mb-2"></textarea>
                <button class="btn btn-success" onclick="addNote()">Add</button>
                <ul id="noteList" class="mt-2 list-group"></ul>
            </div>

            <div id="planner" style="display:none;">
                <h3>Planner</h3>
                <input id="taskTitle" class="form-control mb-2" placeholder="Task">
                <input type="date" id="deadline" class="form-control mb-2">
                <button class="btn btn-warning" onclick="addTask()">Add</button>
                <ul id="taskList" class="mt-2 list-group"></ul>
            </div>

            <div id="resume" style="display:none;">
                <h3>Resume Matcher</h3>
                <textarea id="resumeText" class="form-control mb-2"></textarea>
                <input id="skills" class="form-control mb-2" placeholder="Skills (comma)">
                <button class="btn btn-danger" onclick="match()">Match</button>
                <h4 id="result"></h4>
            </div>

        </div>
    </div>
</div>

<script>
function logout() {
    localStorage.setItem("loggedIn", "false");
    window.location.href = "login.html";
}

function show(id) {
    let sections = ["dashboard","expense","notes","planner","resume"];
    sections.forEach(sec => document.getElementById(sec).style.display="none");
    document.getElementById(id).style.display="block";
}

// Same logic as before
function addExpense() {
    let li = document.createElement("li");
    li.className = "list-group-item";
    li.innerText = document.getElementById("category").value + " ₹" + document.getElementById("amount").value;
    document.getElementById("expenseList").appendChild(li);
}

function addNote() {
    let li = document.createElement("li");
    li.className = "list-group-item";
    li.innerText = document.getElementById("noteTitle").value;
    document.getElementById("noteList").appendChild(li);
}

function addTask() {
    let li = document.createElement("li");
    li.className = "list-group-item";
    li.innerText = document.getElementById("taskTitle").value;
    document.getElementById("taskList").appendChild(li);
}

function match() {
    let resume = document.getElementById("resumeText").value.toLowerCase();
    let skills = document.getElementById("skills").value.split(",");

    let count = 0;
    skills.forEach(s => { if (resume.includes(s.trim())) count++; });

    let score = (count / skills.length) * 100;
    document.getElementById("result").innerText = "Match: " + score.toFixed(2) + "%";
}
</script>

</body>
</html>
