<!DOCTYPE html>
<html>
<head>
    <title>Register - SUSS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="center-box">
    <div class="card p-4" style="width: 350px;">
        <h3 class="text-center">Register</h3>

        <input id="regUser" class="form-control mb-2" placeholder="Username">
        <input id="regPass" type="password" class="form-control mb-2" placeholder="Password">

        <button class="btn btn-success w-100" onclick="register()">Register</button>

        <p class="mt-3 text-center">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("Registered successfully!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
